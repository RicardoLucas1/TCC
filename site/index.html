<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS Correto -->
  <link rel="stylesheet" href="css/style.css">

  <title>Segurança Digital Kids</title>
</head>
<body>

  <!-- Barra Superior -->
  <header class="topbar">
    <h1>🛡️ Segurança Digital para Crianças</h1>
  </header>

  <!-- Imagem Principal -->
  <section class="hero">
    <img src="https://images.unsplash.com/photo-1588072432836-e10032774350"
         alt="Criança usando computador com segurança">
  </section>

  <!-- Cards -->
  <section class="cards">

    <!-- Card 1 -->
    <div class="card">
      <h2>🔐 Jogo da Senha Segura</h2>
      <p>Escolha qual senha é mais segura:</p>

      <button onclick="verificarSenha('1234')">1234</button>
      <button onclick="verificarSenha('Maria')">Maria</button>
      <button onclick="verificarSenha('M4r!@2024')">M4r!@2024</button>

      <p id="resultadoSenha"></p>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <h2>📩 Mensagem Estranha?</h2>
      <p>Alguém desconhecido pediu sua senha. O que fazer?</p>

      <button onclick="respostaMensagem('errado')">Enviar a senha</button>
      <button onclick="respostaMensagem('certo')">Avisar um adulto</button>

      <p id="resultadoMensagem"></p>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <h2>🌍 Informação Pessoal</h2>
      <p>Podemos compartilhar nosso endereço online?</p>

      <button onclick="respostaInfo(false)">Sim</button>
      <button onclick="respostaInfo(true)">Não</button>

      <p id="resultadoInfo"></p>
    </div>

  </section>

  <!-- JS Correto -->
  <script src="js/script.js"></script>

</body>
</html>
