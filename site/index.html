<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segurança Digital Kids</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4e73df, #1cc88a);
      text-align: center;
      color: #333;
    }

    .topbar {
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .hero img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      width: 300px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #4e73df;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2e59d9;
    }

    p {
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header class="topbar">
    <h1>🛡️ Segurança Digital para Crianças</h1>
  </header>

  <section class="hero">
    <img src="https://images.unsplash.com/photo-1581090700227-4c4f50b0e46b" 
         alt="Crianças usando tecnologia com segurança">
  </section>

  <section class="cards">

    <div class="card">
      <h2>🔐 Jogo da Senha Segura</h2>
      <p>Escolha qual senha é mais segura:</p>

      <button onclick="verificarSenha('1234')">1234</button>
      <button onclick="verificarSenha('Maria')">Maria</button>
      <button onclick="verificarSenha('M4r!@2024')">M4r!@2024</button>

      <p id="resultadoSenha"></p>
    </div>

    <div class="card">
      <h2>📩 Mensagem Estranha?</h2>
      <p>Alguém desconhecido pediu sua senha. O que fazer?</p>

      <button onclick="respostaMensagem('errado')">Enviar a senha</button>
      <button onclick="respostaMensagem('certo')">Avisar um adulto</button>

      <p id="resultadoMensagem"></p>
    </div>

    <div class="card">
      <h2>🌍 Informação Pessoal</h2>
      <p>Podemos compartilhar nosso endereço online?</p>

      <button onclick="respostaInfo(false)">Sim</button>
      <button onclick="respostaInfo(true)">Não</button>

      <p id="resultadoInfo"></p>
    </div>

  </section>

  <script>
    function verificarSenha(senha) {
      const resultado = document.getElementById("resultadoSenha");

      if (senha === "M4r!@2024") {
        resultado.innerText = "✅ Correto! Essa é uma senha forte!";
      } else {
        resultado.innerText = "❌ Essa senha é fraca. Tente novamente!";
      }
    }

    function respostaMensagem(tipo) {
      const resultado = document.getElementById("resultadoMensagem");

      if (tipo === "certo") {
        resultado.innerText = "✅ Muito bem! Sempre avise um adulto!";
      } else {
        resultado.innerText = "❌ Nunca envie sua senha para estranhos!";
      }
    }

    function respostaInfo(correto) {
      const resultado = document.getElementById("resultadoInfo");

      if (correto) {
        resultado.innerText = "✅ Certo! Nunca compartilhe informações pessoais!";
      } else {
        resultado.innerText = "❌ Errado! Isso pode ser perigoso!";
      }
    }
  </script>

</body>
</html>
